PLG_SYSTEM_VPSEO="System - VP SEO"
PLG_SYSTEM_VPSEO_XML_DESC="Adds a per-article SEO Title (independent from the H1) and generates OpenGraph and Twitter Card meta tags."

PLG_SYSTEM_VPSEO_FIELDSET_BASIC="Basic Options"

PLG_SYSTEM_VPSEO_TITLEPAT_LABEL="Article Title Template"
PLG_SYSTEM_VPSEO_TITLEPAT_DESC="Template for the article browser title. Tokens: {title}, {category}, {sitename}, and {sep} as the separator between segments. Empty tokens are dropped. Leave blank to disable and use the per-article SEO Title instead."
PLG_SYSTEM_VPSEO_TITLESEP_LABEL="Title Separator"
PLG_SYSTEM_VPSEO_TITLESEP_DESC="The character used for the {sep} token (e.g. |, -, or a dot)."

PLG_SYSTEM_VPSEO_DEF_DESC_LABEL="Default Description"
PLG_SYSTEM_VPSEO_DEF_DESC_DESC="Fallback description used for OG/Twitter when a page has no meta description."
PLG_SYSTEM_VPSEO_DEF_IMG_LABEL="Default Image"
PLG_SYSTEM_VPSEO_DEF_IMG_DESC="Fallback image used for OG/Twitter when an article has no usable image. Use a raster format (PNG/JPEG, ideally 1200x630); SVG is skipped because social platforms cannot render it."
PLG_SYSTEM_VPSEO_AUTODESC_LABEL="Auto Description from Content"
PLG_SYSTEM_VPSEO_AUTODESC_DESC="When no description is set, generate one from the article intro text for OG/Twitter."
PLG_SYSTEM_VPSEO_TWITTER_SITE_LABEL="Twitter / X Handle"
PLG_SYSTEM_VPSEO_TWITTER_SITE_DESC="Optional site account (e.g. @yoursite) added as twitter:site."
PLG_SYSTEM_VPSEO_AUTOCANON_LABEL="Auto Canonical on Articles"
PLG_SYSTEM_VPSEO_AUTOCANON_DESC="Automatically add a canonical link pointing to each article's clean SEF URL, unless overridden per article."
PLG_SYSTEM_VPSEO_ARTMETA_LABEL="Article Author / Section / Tags"
PLG_SYSTEM_VPSEO_ARTMETA_DESC="Emit article:author, article:section and article:tag OpenGraph tags on single articles."

PLG_SYSTEM_VPSEO_PREVIEW_LABEL="Social Preview"
PLG_SYSTEM_VPSEO_PREVIEW_HEADING="Social Preview"
PLG_SYSTEM_VPSEO_PREVIEW_HINT="How this article will look when shared on Facebook, X and other platforms."
PLG_SYSTEM_VPSEO_PREVIEW_TITLE_PH="Article title"
PLG_SYSTEM_VPSEO_PREVIEW_DESC_PH="Your social description will appear here."
PLG_SYSTEM_VPSEO_SEOTITLE_LABEL="SEO Title"
PLG_SYSTEM_VPSEO_SEOTITLE_DESC="Custom browser title for this article. When set, it overrides the &lt;title&gt; tag so it no longer matches the article heading (H1). Leave empty to keep the default behaviour."
PLG_SYSTEM_VPSEO_APPEND_LABEL="Append Site Name"
PLG_SYSTEM_VPSEO_APPEND_DESC="Whether to append the site name to the SEO Title. 'Use Global' follows the global 'Include Site Name in Page Titles' setting."
PLG_SYSTEM_VPSEO_OGDESC_LABEL="Social Description"
PLG_SYSTEM_VPSEO_OGDESC_DESC="Custom description for OpenGraph/Twitter Card. Falls back to the meta description, then the global default."
PLG_SYSTEM_VPSEO_OGIMG_LABEL="Social Image"
PLG_SYSTEM_VPSEO_OGIMG_DESC="Custom image for OpenGraph/Twitter Card. Falls back to the article intro image, then the global default."
PLG_SYSTEM_VPSEO_CANONICAL_LABEL="Canonical URL"
PLG_SYSTEM_VPSEO_CANONICAL_DESC="Override the canonical URL for this article. Leave empty to use the default (or auto canonical, if enabled)."
